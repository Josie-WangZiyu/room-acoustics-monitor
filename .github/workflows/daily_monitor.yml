name: Daily Acoustic Monitor Workflow

on:
  schedule:
    - cron: '0 0 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build_and_deploy:
    runs-on: ubuntu-latest
    
    steps:
      - name: 1. 检出代码
        uses: actions/checkout@v4

      - name: 2. 配置 Python 环境
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
          
      - name: 3. 安装 Python 依赖
        run: pip install feedparser requests

      - name: 4. 运行 Python 爬虫与大模型分析
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: python fetch_papers.py

      - name: 5. 状态检测与防御性 Git 提交
        run: |
          git config --global user.name 'GitHub Action Bot'
          git config --global user.email 'action@github.com'
          git add content/ || true
          if [ -n "$(git status --porcelain)" ]; then
            echo "检测到新文献生成，正在提交更新..."
            git commit -m "Auto-update papers"
            git push
          else
            echo "当前未捕获到符合小空间声学标准的新文献，跳过本次云端同步。"
          fi

      - name: 6. 强行注入网页主题皮肤 (环境自愈)
        run: |
          rm -rf themes/PaperMod
          mkdir -p themes
          git clone https://github.com/adityatelange/hugo-PaperMod.git themes/PaperMod

      - name: 7. 安装 Hugo 生成器
        uses: peaceiris/actions-hugo@v3
        with:
          hugo-version: 'latest'
          extended: true

      - name: 8. 编译静态网页
        run: hugo --minify

      - name: 9. 部署到 GitHub Pages 展示
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./public